<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Busy AI - Professional Reel</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    font-family:'Poppins',sans-serif;
    color:white;
}

canvas{
    width:280px;   /* smaller preview screen */
    height:500px;
    border-radius:25px;
    box-shadow:0 0 40px rgba(0,255,255,0.3);
}

.buttons{
    margin-top:15px;
    display:flex;
    gap:8px;
}

button{
    padding:6px 14px;
    border:none;
    border-radius:15px;
    font-weight:600;
    font-size:12px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{ transform:scale(1.05); }

.download{background:#ff0080;}
.gallery{background:#00c853;}
.share{background:#2979ff;}
.back{background:#444;}
</style>
</head>
<body>

<canvas id="canvas" width="360" height="640"></canvas>

<div class="buttons">
<button class="download" onclick="downloadReel()">Download</button>
<button class="gallery" onclick="saveReel()">Save</button>
<button class="share" onclick="shareReel()">Share</button>
<button class="back" onclick="goBack()">Back</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const data = JSON.parse(localStorage.getItem("videoData"));
if(!data){
    alert("No video data found!");
    window.location.href="video-maker-info.html";
}

const totalDuration = parseInt(data.videoDuration) || 15;

// ================= ICON DETECTION =================

function detectIcon(text){
    text = text.toLowerCase();
    if(text.includes("business")) return "💼";
    if(text.includes("fitness")) return "💪";
    if(text.includes("food")) return "🍔";
    if(text.includes("ai")) return "🤖";
    if(text.includes("love")) return "❤️";
    if(text.includes("money")) return "💰";
    return "✨";
}

// ================= TEXT WRAPPING =================

function wrapText(text, maxWidth){
    const words = text.split(" ");
    let lines = [];
    let line = "";

    words.forEach(word=>{
        let testLine = line + word + " ";
        let metrics = ctx.measureText(testLine);
        if(metrics.width > maxWidth){
            lines.push(line);
            line = word + " ";
        }else{
            line = testLine;
        }
    });
    lines.push(line);
    return lines;
}

// ================= BACKGROUND =================

function drawBackground(){
    const grad = ctx.createLinearGradient(0,0,0,canvas.height);
    grad.addColorStop(0,"#000428");
    grad.addColorStop(1,"#004e92");
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);
}

// ================= DRAW TEXT =================

function drawSlide(text, opacity=1, offsetY=0){

    ctx.save();
    ctx.globalAlpha = opacity;

    drawBackground();

    ctx.textAlign="center";
    ctx.fillStyle="#ffffff";
    ctx.font="bold 26px Poppins";

    ctx.shadowColor="#00f2ff";
    ctx.shadowBlur=20;

    const icon = detectIcon(text);
    const wrapped = wrapText(text, 300);

    let startY = canvas.height/2 - (wrapped.length*20);

    // Draw Icon
    ctx.font="50px Poppins";
    ctx.fillText(icon, canvas.width/2, startY-60+offsetY);

    ctx.font="bold 26px Poppins";
    wrapped.forEach((line,i)=>{
        ctx.fillText(line, canvas.width/2, startY + (i*35) + offsetY);
    });

    ctx.restore();
}

// ================= ANIMATION =================

let startTime=null;
const slides = [
    { text:`Welcome to ${data.businessName || "Busy AI"}`, duration:2 },
    { text:`${data.videoTitle || ""} ${data.videoDescription || ""}`, duration: totalDuration-4 },
    { text:`Created with Busy AI`, duration:2 }
];

function animate(timestamp){
    if(!startTime) startTime = timestamp;
    let elapsed = (timestamp-startTime)/1000;

    let cumulative=0;
    let currentSlide=slides[0];

    for(let slide of slides){
        cumulative+=slide.duration;
        if(elapsed<=cumulative){
            currentSlide=slide;
            break;
        }
    }

    let slideStart = cumulative-currentSlide.duration;
    let progress = (elapsed-slideStart)/currentSlide.duration;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(progress<0.5){
        drawSlide(currentSlide.text, progress*2, 50-(progress*100));
    }else{
        drawSlide(currentSlide.text, 1, 0);
    }

    if(elapsed < slides.reduce((a,s)=>a+s.duration,0)){
        requestAnimationFrame(animate);
    }
}

requestAnimationFrame(animate);

// ================= RECORD =================

function recordVideo(callback){
    const stream = canvas.captureStream(30);
    const recorder = new MediaRecorder(stream);
    let chunks=[];

    recorder.ondataavailable=e=>{ if(e.data.size>0) chunks.push(e.data); };
    recorder.onstop=()=>callback(new Blob(chunks,{type:"video/webm"}));

    recorder.start();
    setTimeout(()=>recorder.stop(), slides.reduce((a,s)=>a+s.duration,0)*1000);
}

function downloadReel(){
    recordVideo(blob=>{
        const a=document.createElement("a");
        a.href=URL.createObjectURL(blob);
        a.download="BusyAI_Reel.webm";
        a.click();
    });
}

function saveReel(){
    alert("Video saving supported via download only.");
}

function shareReel(){
    alert("Download and share manually.");
}

function goBack(){
    window.location.href="video-style.html";
}
</script>

</body>
</html>
