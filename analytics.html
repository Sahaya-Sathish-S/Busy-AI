<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Busy AI - Smart Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top,#0f2027,#090a0f 70%);
    color:white;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

.title{
    text-align:center;
    font-size:36px;
    font-weight:700;
    background:linear-gradient(90deg,#00f2ff,#00ff99);
    -webkit-background-clip:text;
    color:transparent;
}

.subtitle{
    text-align:center;
    opacity:0.7;
    margin-bottom:40px;
}

/* KPI CARDS */

.kpi-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:40px;
}

.kpi-card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,255,255,0.08);
    transition:0.3s;
}

.kpi-card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 30px rgba(0,255,255,0.2);
}

.kpi-card h3{
    font-size:14px;
    opacity:0.7;
}

.kpi-card h2{
    margin-top:10px;
    font-size:26px;
    color:#00ffcc;
}

/* CHARTS */

.charts{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,255,255,0.08);
}

canvas{ max-width:100%; }

/* AI SECTION */

.ai-section{
    margin-top:50px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 30px rgba(0,255,255,0.15);
}

.ai-section h2{
    color:#00f2ff;
}

.highlight{
    color:#00ff99;
    font-weight:bold;
}

.score{
    font-size:48px;
    font-weight:700;
    background:linear-gradient(90deg,#00f2ff,#00ff99);
    -webkit-background-clip:text;
    color:transparent;
}

@media(max-width:900px){
    .charts{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<div class="container">

<h1 class="title">🚀 Busy AI Smart Dashboard</h1>
<p class="subtitle">Advanced AI insights for modern businesses</p>

<div class="kpi-grid">
    <div class="kpi-card">
        <h3>Total Revenue</h3>
        <h2 id="rev"></h2>
    </div>

    <div class="kpi-card">
        <h3>Total Expenses</h3>
        <h2 id="exp"></h2>
    </div>

    <div class="kpi-card">
        <h3>Net Profit</h3>
        <h2 id="profit"></h2>
    </div>

    <div class="kpi-card">
        <h3>Avg Customer Value</h3>
        <h2 id="avg"></h2>
    </div>
</div>

<div class="charts">

<div class="card">
    <h3>Profit vs Expenses</h3>
    <canvas id="pieChart"></canvas>
</div>

<div class="card">
    <h3>Business Performance</h3>
    <canvas id="barChart"></canvas>
</div>

</div>

<div class="ai-section" id="aiSuggestion"></div>

</div>

<script>

/* LOAD DATA */
const data = JSON.parse(localStorage.getItem("businessAnalytics"));
if(!data){
    alert("No data found!");
    window.location.href="business-info.html";
}

const revenue = data.revenue;
const expenses = data.expenses;
const customers = data.customers;
const profit = revenue - expenses;
const avgCustomerValue = customers > 0 ? (revenue/customers).toFixed(2) : 0;
const profitMargin = ((profit/revenue)*100).toFixed(1);
const expenseRatio = ((expenses/revenue)*100).toFixed(1);

/* KPI VALUES */
document.getElementById("rev").innerText = "₹" + revenue;
document.getElementById("exp").innerText = "₹" + expenses;
document.getElementById("profit").innerText = "₹" + profit;
document.getElementById("avg").innerText = "₹" + avgCustomerValue;

/* PIE CHART */
new Chart(document.getElementById("pieChart"),{
type:"doughnut",
data:{
labels:["Expenses","Profit"],
datasets:[{
data:[expenses, profit>0?profit:0],
backgroundColor:["#ff4d4d","#00ff99"]
}]
},
options:{
plugins:{legend:{labels:{color:"white"}}}
}
});

/* BAR CHART */
new Chart(document.getElementById("barChart"),{
type:"bar",
data:{
labels:["Revenue","Expenses","Profit","Customers"],
datasets:[{
data:[revenue,expenses,profit,customers],
backgroundColor:["#00f2ff","#ff4d4d","#00ff99","#ffbf00"]
}]
},
options:{
scales:{
x:{ticks:{color:"white"}},
y:{ticks:{color:"white"}}
},
plugins:{legend:{display:false}}
}
});

/* AI LOGIC */
let score = 50;

if(profit > 0) score += 20;
if(profitMargin > 20) score += 15;
if(expenseRatio < 70) score += 10;
if(customers > 100) score += 5;

if(score > 100) score = 100;

let suggestionHTML = `
<h2>🤖 AI Business Intelligence</h2>
<p>Your Business Health Score:</p>
<div class="score">${score}/100</div>
<br>
`;

if(profit <= 0){
    suggestionHTML += `<p>⚠️ You are currently at a loss. Focus on <span class="highlight">reducing costs</span> and increasing pricing strategy.</p>`;
}else{
    suggestionHTML += `<p>✅ You are profitable with a margin of <span class="highlight">${profitMargin}%</span>.</p>`;
}

suggestionHTML += `
<p>📊 Expense Ratio: <span class="highlight">${expenseRatio}%</span></p>
<p>💰 Average Customer Value: <span class="highlight">₹${avgCustomerValue}</span></p>
<p>📈 Recommendation: Improve marketing, upsell products, retain customers, and track performance monthly.</p>
`;

document.getElementById("aiSuggestion").innerHTML = suggestionHTML;

</script>

</body>
</html>
