<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Busy AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌌 BODY FIXED (NO SCROLL BUG) */
/* 💬 CHAT BUBBLES */
.msg {
    max-width: 70%;
    padding: 12px 16px;
    margin: 10px;
    border-radius: 15px;
    line-height: 1.5;
    white-space: pre-line;
    animation: fadeIn 0.4s ease;
}

/* 👤 USER */
.msg.user {
    align-self: flex-end;
    background: linear-gradient(90deg, #00f0ff, #0077ff);
    color: white;
    border-bottom-right-radius: 5px;
}

/* 🤖 BOT */
.msg.bot {
    align-self: flex-start;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    border-bottom-left-radius: 5px;
    box-shadow: 0 0 10px rgba(0,255,255,0.2);
}

/* CHAT BOX FLEX */
.chat-box {
    display: flex;
    flex-direction: column;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}

body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    color: white;

    background: linear-gradient(rgba(5,10,20,0.85), rgba(5,10,20,0.85)),
                url("desktop-bg.png");
    background-size: cover;
    background-position: center;
}

/* 📱 MOBILE BG */
@media (max-width: 768px) {
    body {
        background: linear-gradient(rgba(5,10,20,0.85), rgba(5,10,20,0.85)),
                    url("mobile-bg.png");
    }
}

/* 🌟 LAYOUT */
.app {
    display: flex;
    height: 100vh;
}

/* 📱 MOBILE */
@media (max-width: 768px) {
    .app {
        flex-direction: column;
    }
}

/* 🔥 SIDEBAR */
.sidebar {
    width: 260px;
    padding: 20px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 50px rgba(0,255,255,0.2);
    display: flex;
    flex-direction: column;
    gap: 15px;
    transition: 0.4s;
}

/* 📱 SIDEBAR MOBILE */
@media (max-width: 768px) {
    .sidebar {
        position: absolute;
        left: -100%;
        top: 0;
        height: 100%;
        z-index: 100;
    }
    .sidebar.active {
        left: 0;
    }
}

/* ✨ LOGO */
.logo {
    font-size: 28px;
    text-align: center;
    font-weight: bold;
    background: linear-gradient(90deg, #00f0ff, #ff00ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* 🚀 GOD LEVEL BUTTON */
.side-btn {
    padding: 14px;
    border-radius: 15px;
    border: none;
    color: white;
    cursor: pointer;
    background: rgba(255,255,255,0.05);
    position: relative;
    transition: 0.4s;
    overflow: hidden;
}

/* glow wave */
.side-btn::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    background: linear-gradient(120deg, transparent, cyan, magenta, transparent);
    transform: rotate(25deg);
    opacity: 0;
    transition: 0.5s;
}

.side-btn:hover::after {
    opacity: 0.5;
    animation: shine 1.5s linear infinite;
}

.side-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 25px cyan;
}

/* 🧠 CHAT AREA */
.chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.chat-header {
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.4);
}

/* TEXT */
.chat-header span {
    background: linear-gradient(90deg, #00f0ff, #ff00ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* MENU BTN */
.menu-btn {
    display: none;
}
@media (max-width:768px){
    .menu-btn{ display:block; cursor:pointer; }
}

/* ICONS */
.icons span {
    margin-left: 15px;
    cursor: pointer;
    transition: 0.3s;
}
.icons span:hover {
    transform: scale(1.3);
    text-shadow: 0 0 15px magenta;
}

/* CHAT BOX (ONLY SCROLL HERE) */
.chat-box {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

/* MESSAGE */
.message {
    padding: 12px 18px;
    border-radius: 15px;
    margin-bottom: 10px;
    background: rgba(0,255,255,0.15);
    backdrop-filter: blur(5px);
    animation: fadeIn 0.5s ease;
}

/* INPUT */
.chat-input {
    display: flex;
    padding: 15px;
    background: rgba(0,0,0,0.4);
}

.chat-input input {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

/* SEND */
.send-btn {
    margin-left: 10px;
    padding: 12px 18px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(90deg, cyan, magenta);
    cursor: pointer;
    transition: 0.3s;
}
.send-btn:hover {
    transform: scale(1.15);
    box-shadow: 0 0 25px magenta;
}

/* 🌌 PARTICLES (FIXED) */
.particle {
    position: fixed;
    width: 3px;
    height: 3px;
    background: cyan;
    opacity: 0.7;
    animation: move linear infinite;
}

/* ANIMATIONS */
@keyframes move {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

@keyframes shine {
    from { transform: rotate(25deg) translateX(-100%); }
    to { transform: rotate(25deg) translateX(100%); }
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}

</style>
</head>

<body>

<!-- 🌌 PARTICLES -->
<script>
for(let i=0;i<25;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"%";
    p.style.animationDuration=(6+Math.random()*6)+"s";
    document.body.appendChild(p);
}
</script>

<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
    <h2 class="logo">Busy AI</h2>
    <button class="side-btn">📸 Photo Maker</button>
    <button class="side-btn">🎥 Video Maker</button>
    <button class="side-btn">📊 Business</button>
    <button class="side-btn">🛒 Shop</button>
    <button class="side-btn">🎨 Logo Studio</button>
    <button class="side-btn">🌐 Web Builder</button>
</aside>

<!-- MAIN -->
<main class="chat-area">

<header class="chat-header">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <h1>Welcome to <span>Busy AI</span></h1>
    <div class="icons">
        <span>🖼️</span>
        <span>⚙️</span>
        <span>👤</span>
    </div>
</header>

<section class="chat-box">
    <div class="message">👋 Hello, how can I help you today?</div>
</section>

<footer class="chat-input">
    <input type="text" placeholder="Enter message...">
    <button class="send-btn">➤</button>
</footer>

</main>

</div>

<script src="script.js"></script>

</body>
</html>
