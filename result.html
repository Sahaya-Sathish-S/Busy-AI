<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Busy AI Professional Poster</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body {
    margin:0;
    font-family:'Cambria', serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    min-height:100vh;
    padding:30px;
}

/* Poster container */
#poster {
    width:475px;
    min-height:700px;
    padding:30px;
    border-radius:0px; /* square */
    box-shadow:0 0 60px rgba(0,255,213,0.6);
    display:flex;
    flex-direction:column;
    position:relative;
    color:white;
    overflow:hidden;
    transition:0.3s;
}

/* Title and Slogan */
#poster h1 {
    font-size:42px;
    font-weight:bold;
    font-family:'Cambria', serif;
    text-align:center;
    color:#00ffd5;
    text-shadow:0 0 25px #00ffd5,0 0 45px #00aaff;
}
#poster h2 {
    font-size:22px;
    font-style:italic;
    font-weight:500;
    text-align:center;
    color:#ffdd57;
    margin-bottom:15px;
}

/* Info Boxes */
.detail-box {
    background: rgba(255,255,255,0.08);
    padding:12px 15px;
    border-radius:12px;
    display:flex;
    align-items:center;
    gap:10px;
    box-shadow:0 0 20px rgba(0,255,213,0.3);
    transition:0.3s;
}
.detail-box:hover {transform:scale(1.02);}
.detail-box img {width:28px;height:28px;}

/* Service / Offer / Description boxes */
#service-box,#offer-box,#description-box {
    display:flex; flex-direction:column; gap:8px; margin-bottom:10px;
}

/* Social Media Box */
#social-box {
    position:absolute;
    bottom:120px;
    left:30px;
    background: rgba(0,0,0,0.45);
    padding:12px;
    border-left:4px solid #00ffd5;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    gap:5px;
}

/* Contact Box */
#contact-box {
    position:absolute;
    bottom:30px;
    right:30px;
    background: rgba(0,0,0,0.45);
    padding:12px;
    border-radius:10px;
    display:flex;
    flex-direction:column;
    gap:5px;
    text-align:right;
}

/* Floating AI Icons */
.floating-icon {
    position:absolute;
    width:45px; height:45px;
    opacity:0.8;
    animation: float 18s infinite linear;
}
@keyframes float {
    0% {transform:translate(0,0) rotate(0deg);}
    50% {transform:translate(60px,-50px) rotate(45deg);}
    100% {transform:translate(-60px,60px) rotate(90deg);}
}

/* Buttons */
.buttons {
    margin-top:25px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
}
.buttons button {
    padding:10px 16px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    font-size:14px;
    transition:0.3s;
}
.buttons button:hover {transform:scale(1.05);}
.download {background:#ff0080;color:white;}
.gallery {background:#00c853;color:white;}
.share {background:#2979ff;color:white;}
.back {background:#444;color:white;}
</style>
</head>
<body>

<div id="poster">
    <h1 id="business"></h1>
    <h2 id="slogan"></h2>
    <div id="service-box"></div>
    <div id="offer-box"></div>
    <div id="description-box"></div>
    <div id="social-box"></div>
    <div id="contact-box"></div>
</div>

<div class="buttons">
    <button class="download" onclick="downloadPoster()">Download</button>
    <button class="gallery" onclick="saveToGallery()">Save to Gallery</button>
    <button class="share" onclick="sharePoster()">Share</button>
    <button class="back" onclick="goBack()">Back</button>
</div>

<script>
// Fetch all poster data from photo-maker-info.html
const data = JSON.parse(localStorage.getItem("posterData") || "{}");
const theme = localStorage.getItem("selectedTheme") || "theme1";

if(!data.business || !data.service){
    alert("No poster data found!");
    window.location.href="photo-maker-info.html";
}

// Themes
const poster = document.getElementById("poster");
const themes = {
    theme1: "linear-gradient(135deg,#0f2027,#203a43,#2c5364)",
    theme2: "linear-gradient(135deg,#1e0033,#3a0066,#5e0099)",
    theme3: "linear-gradient(135deg,#000428,#004e92)",
    theme4: "linear-gradient(135deg,#ff512f,#dd2476)",
    theme5: "linear-gradient(135deg,#004d40,#00695c,#00796b)",
    theme6: "linear-gradient(135deg,#ff7e5f,#feb47b)",
    theme7: "linear-gradient(135deg,#00c6ff,#0072ff)",
    theme8: "linear-gradient(135deg,#fc5c7d,#6a82fb)",
    theme9: "linear-gradient(135deg,#11998e,#38ef7d)",
    theme10:"linear-gradient(135deg,#f7971e,#ffd200)",
    theme11:"linear-gradient(135deg,#ee9ca7,#ffdde1)",
    theme12:"linear-gradient(135deg,#00f260,#0575e6)",
    theme13:"linear-gradient(135deg,#8e2de2,#4a00e0)",
    theme14:"linear-gradient(135deg,#ff6a00,#ee0979)",
    theme15:"linear-gradient(135deg,#43cea2,#185a9d)"
};
poster.style.background = themes[theme] || themes.theme1;

// Titles
document.getElementById("business").innerText = data.business;
document.getElementById("slogan").innerText = data.tagline || "Best in Town!";

// Function to add info boxes
function addBox(containerId, icon, text){
    if(!text) return;
    const container = document.getElementById(containerId);
    const div = document.createElement("div");
    div.className="detail-box";
    const img = document.createElement("img");
    img.src = icon;
    const span = document.createElement("span");
    span.innerText=text;
    div.appendChild(img); div.appendChild(span);
    container.appendChild(div);
}

// Add details
addBox("service-box","https://img.icons8.com/color/48/000000/services.png",data.service);
addBox("offer-box","https://img.icons8.com/color/48/000000/discount.png",data.offer);
addBox("description-box","https://img.icons8.com/color/48/000000/info.png",data.description);
addBox("description-box","https://img.icons8.com/color/48/000000/email.png",data.email);
addBox("description-box","https://img.icons8.com/color/48/000000/youtube-play.png",data.youtube);
addBox("description-box","https://img.icons8.com/color/48/000000/domain.png",data.website);
addBox("description-box","https://img.icons8.com/color/48/000000/address.png",data.address);

// Social media
if(data.social){
    const socialContainer = document.getElementById("social-box");
    socialContainer.innerHTML="";
    const span = document.createElement("span");
    span.style.display="flex"; span.style.flexDirection="column"; span.style.gap="5px";
    data.social.split(",").forEach(sm=>{
        const line = document.createElement("div");
        line.style.display="flex"; line.style.alignItems="center"; line.style.gap="5px";
        const img = document.createElement("img");
        img.src="https://img.icons8.com/color/48/000000/link.png";
        img.style.width="25px"; img.style.height="25px";
        line.appendChild(img);
        const txt = document.createTextNode(sm.trim());
        line.appendChild(txt);
        span.appendChild(line);
    });
    if(span.children.length>0) socialContainer.appendChild(span);
}

// Contact box
if(data.contact){
    const contactContainer = document.getElementById("contact-box");
    contactContainer.innerHTML="";
    const lines = data.contact.split("\n");
    lines.forEach(line=>{
        const div = document.createElement("div");
        div.innerText=line;
        contactContainer.appendChild(div);
    });
}

// Floating AI icons based on keywords
const aiIcons = {
    tech:"https://img.icons8.com/color/48/000000/artificial-intelligence.png",
    mobile:"https://img.icons8.com/color/48/000000/smartphone.png",
    shop:"https://img.icons8.com/color/48/000000/shopping-cart.png",
    food:"https://img.icons8.com/color/48/000000/restaurant.png",
    service:"https://img.icons8.com/color/48/000000/services.png",
    marketing:"https://img.icons8.com/color/48/000000/megaphone.png"
};
for(let key in aiIcons){
    if(data.service && data.service.toLowerCase().includes(key)){
        const img=document.createElement("img");
        img.src=aiIcons[key];
        img.className="floating-icon";
        img.style.top=Math.random()*400+"px";
        img.style.left=Math.random()*400+"px";
        poster.appendChild(img);
    }
}

// Poster actions
function downloadPoster(){html2canvas(poster,{useCORS:true}).then(c=>{const l=document.createElement("a");l.download="BusyAI_Poster.png";l.href=c.toDataURL();l.click();});}
function saveToGallery(){html2canvas(poster,{useCORS:true}).then(c=>{const img=c.toDataURL("image/png");let g=JSON.parse(localStorage.getItem("gallery"))||[];g.push({image:img,title:data.business,date:new Date().toLocaleString()});localStorage.setItem("gallery",JSON.stringify(g));alert("Poster saved to gallery!");});}
function sharePoster(){html2canvas(poster,{useCORS:true}).then(c=>{c.toBlob(b=>{const f=new File([b],"BusyAI_Poster.png",{type:"image/png"});if(navigator.share){navigator.share({files:[f],title:data.business,text:"Created with Busy AI"});}else{alert("Sharing not supported on this device");}});});}
function goBack(){window.location.href="theme-selection.html";}
</script>

</body>
</html>
