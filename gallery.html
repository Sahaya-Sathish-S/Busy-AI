<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gallery - Busy AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ===== BODY WITH BACKGROUND IMAGE ===== */
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    color:white;
    min-height:100vh;

    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)),
                url("gallery.png");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* ===== CONTAINER ===== */
.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
    text-align:center;
}

/* ===== TITLE ===== */
.title{
    font-size:42px;
    font-weight:600;
    margin-bottom:10px;

    background: linear-gradient(90deg, #00f0ff, #ff00ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle{
    opacity:0.8;
    margin-bottom:40px;
}

/* ===== GRID ===== */
.gallery-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

/* ===== CARD ===== */
.gallery-item{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    padding:15px;
    border-radius:18px;
    transition:0.4s;
    box-shadow: 0 0 15px rgba(0,255,255,0.2);
}

.gallery-item:hover{
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 0 25px cyan;
}

/* IMAGE */
.gallery-item img{
    width:100%;
    border-radius:12px;
}

/* TEXT */
.gallery-item p{
    margin:10px 0 5px;
    font-weight:500;
}

.gallery-item small{
    opacity:0.7;
}

/* BUTTON */
.gallery-item button{
    margin-top:10px;
    padding:8px 14px;
    border:none;
    border-radius:10px;
    background: linear-gradient(45deg, red, crimson);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.gallery-item button:hover{
    transform:scale(1.1);
    box-shadow:0 0 15px red;
}

/* EMPTY */
.empty{
    margin-top:100px;
    opacity:0.7;
}

.empty h2{
    font-size:28px;
}

</style>

</head>

<body>

<div class="container">

```
<h1 class="title">Your Gallery</h1>
<p class="subtitle">Browse your generated photos, videos & logos</p>

<div id="galleryContent"></div>
```

</div>

<script>

function loadGallery(){
    const gallery = JSON.parse(localStorage.getItem("gallery")) || [];
    const container = document.getElementById("galleryContent");
    container.innerHTML = "";

    if(gallery.length === 0){
        container.innerHTML = `
            <div class="empty">
                <h2>No creations yet</h2>
                <p>Create posters, videos or logos to see them here.</p>
            </div>
        `;
        return;
    }

    container.className = "gallery-grid";

    gallery.forEach((item,index)=>{
        const div = document.createElement("div");
        div.className = "gallery-item";

        div.innerHTML = `
            <img src="${item.image}">
            <p>${item.title || "Untitled"}</p>
            <small>${item.date || ""}</small>
            <br>
            <button onclick="deleteImage(${index})">🗑 Delete</button>
        `;

        container.appendChild(div);
    });
}

function deleteImage(index){
    let gallery = JSON.parse(localStorage.getItem("gallery")) || [];

    if(confirm("Delete this item?")){
        gallery.splice(index,1);
        localStorage.setItem("gallery", JSON.stringify(gallery));
        loadGallery();
    }
}

loadGallery();

</script>

</body>
</html>
