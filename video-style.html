<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Busy AI - Video Style</title>
    <link rel="stylesheet" href="video-style.css">
    <style>
        /* Highlight selected style */
        .style-card.selected {
            border: 3px solid #ffbf00;
            box-shadow: 0 0 20px #ffbf00;
        }
        .style-card img {
            width: 100%;
            border-radius: 10px;
        }
        .style-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .style-card {
            text-align: center;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s all;
            border: 2px solid transparent;
        }
        .style-card h3 {
            margin: 10px 0;
        }
        .generate-btn {
            margin-top: 30px;
            padding: 12px 30px;
            font-size: 16px;
            cursor: pointer;
            background: #ffbf00;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
        }
        .generate-btn:hover {
            background: #ffaa00;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Select Your AI Video Style 🎬</h1>
    <p class="subtitle">Choose the cinematic magic you want AI to generate</p>

    <div class="style-grid">

        <div class="style-card" data-style="Cinematic Movie Trailer">
            <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" alt="">
            <h3>Cinematic Movie Trailer</h3>
        </div>

        <div class="style-card" data-style="Luxury Brand Promo">
            <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7" alt="">
            <h3>Luxury Brand Promo</h3>
        </div>

        <div class="style-card" data-style="Futuristic AI Tech">
            <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7" alt="">
            <h3>Futuristic AI Tech</h3>
        </div>

        <div class="style-card" data-style="Emotional Story Reel">
            <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728" alt="">
            <h3>Emotional Story Reel</h3>
        </div>

        <div class="style-card" data-style="Instagram Viral Reel">
            <img src="https://images.unsplash.com/photo-1517602302552-471fe67acf66" alt="">
            <h3>Instagram Viral Reel</h3>
        </div>

        <div class="style-card" data-style="Corporate Presentation">
            <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7" alt="">
            <h3>Corporate Presentation</h3>
        </div>

    </div>

    <div class="generate-section">
        <button class="generate-btn" id="generateBtn">Generate AI Video 🚀</button>
    </div>
</div>

<script>
    // Load video info from previous page
    const videoData = JSON.parse(localStorage.getItem("videoData")) || {};

    let selectedStyle = null;

    // Style card selection
    const styleCards = document.querySelectorAll(".style-card");
    styleCards.forEach(card => {
        card.addEventListener("click", () => {
            // Remove selection from all
            styleCards.forEach(c => c.classList.remove("selected"));
            // Select current
            card.classList.add("selected");
            selectedStyle = card.getAttribute("data-style");
        });
    });

    // Generate video button
    document.getElementById("generateBtn").addEventListener("click", () => {
        if(!selectedStyle){
            alert("Please select a video style first!");
            return;
        }

        // Add selected style to videoData
        videoData.selectedStyle = selectedStyle;

        // Save to localStorage
        localStorage.setItem("videoData", JSON.stringify(videoData));

        // Redirect to result page
        window.location.href = "result1.html";
    });
</script>

</body>
</html>
