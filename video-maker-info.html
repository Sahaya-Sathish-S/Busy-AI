<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Video Maker - Busy AI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Roboto:ital,wght@0,400;1,500&display=swap" rel="stylesheet">
<style>
/* ===== Reset ===== */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }

/* ===== Body & Background ===== */
body {
    min-height:100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display:flex; justify-content:center; align-items:flex-start;
    padding:40px 20px;
    color:white; overflow-y:auto;
}

/* Floating AI icons */
.floating-icon {
    position:absolute;
    font-size:1.8rem;
    opacity:0.6;
    animation: float 10s infinite linear;
}
@keyframes float {
    0% {transform:translate(0,0) rotate(0deg);}
    50% {transform:translate(30px,-40px) rotate(45deg);}
    100% {transform:translate(-30px,40px) rotate(90deg);}
}

/* ===== Container ===== */
.container {
    width:100%;
    max-width:800px;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(15px);
    border-radius:25px;
    padding:40px;
    box-shadow: 0 0 60px rgba(0,255,213,0.5);
    position:relative;
    animation: glow 3s infinite alternate;
}
@keyframes glow {
    0% { box-shadow:0 0 20px rgba(0,255,213,0.4); }
    100% { box-shadow:0 0 60px rgba(0,255,213,0.7); }
}

/* ===== Titles ===== */
h1.title {
    text-align:center; color:#00ffd5;
    text-shadow:0 0 20px #00ffd5, 0 0 40px #00aaff;
    margin-bottom:10px; font-size:2.5rem;
}
p.subtitle {
    text-align:center; margin-bottom:30px;
    font-weight:500; font-size:1rem; opacity:0.9;
}

/* ===== Form ===== */
.form-card { display:flex; flex-direction:column; gap:20px; }

/* ===== Glowing Input Boxes ===== */
.input-group {
    display:flex; flex-direction:column;
    background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.1));
    padding:15px 20px; border-radius:20px;
    border:1px solid rgba(0,255,213,0.3); transition:0.3s;
}
.input-group:hover { border-color:#00ffd5; box-shadow:0 0 25px rgba(0,255,213,0.5); }
.input-group label { margin-bottom:6px; font-weight:600; color:#00ffd5; }
.input-group input, .input-group textarea, .input-group select {
    padding:12px; border-radius:12px; border:none; outline:none;
    background: rgba(255,255,255,0.05); color:#fff; font-size:15px;
}
.input-group textarea { min-height:80px; resize:none; }

/* Select & checkboxes styling */
.select-field, .checkbox-field { background: rgba(255,255,255,0.05); color:#fff; border-radius:12px; padding:10px; }

/* Floating AI icons around form */
.ai-icon {
    position:absolute; font-size:2rem; opacity:0.5; animation: float 12s infinite linear;
}

/* Submit Button */
.glow-btn {
    padding:15px; border-radius:25px; border:none;
    background: linear-gradient(45deg, #00ffd5, #00aaff);
    color:#000; font-weight:700; cursor:pointer;
    box-shadow: 0 0 25px #00ffd5, 0 0 50px #00aaff;
    transition:0.3s;
    font-size:1.1rem;
}
.glow-btn:hover { transform:scale(1.05); box-shadow:0 0 35px #00ffd5,0 0 70px #00aaff; }

/* Optional group headers */
.group-title { font-size:1.1rem; font-weight:600; color:#ffdd57; margin-bottom:5px; }
</style>
</head>
<body>

<!-- Floating AI icons for animation effect -->
<div class="ai-icon" style="top:10px; left:50px;">🤖</div>
<div class="ai-icon" style="top:50px; right:40px;">🧠</div>
<div class="ai-icon" style="bottom:30px; left:80px;">💻</div>
<div class="ai-icon" style="bottom:50px; right:100px;">🎬</div>

<div class="container">
    <h1 class="title">🎥 AI Video Maker</h1>
    <p class="subtitle">Turn your business details into a captivating video reel</p>

    <form class="form-card" id="videoForm">

        <div class="input-group">
            <label>Business / Channel Name</label>
            <input type="text" id="businessName" required>
        </div>

        <div class="input-group">
            <label>Video Title / Reel Title</label>
            <input type="text" id="videoTitle" placeholder="Catchy title" required>
        </div>

        <div class="input-group">
            <label>Video Description</label>
            <textarea id="videoDescription" placeholder="Describe your video content..." required></textarea>
        </div>

        <div class="input-group">
            <label>Video Duration</label>
            <select id="videoDuration" class="select-field">
                <option value="15">15 Seconds</option>
                <option value="30">30 Seconds</option>
                <option value="45">45 Seconds</option>
                <option value="60">60 Seconds</option>
            </select>
        </div>

        <div class="input-group">
            <label>Upload Images / Clips</label>
            <input type="file" id="videoFiles" multiple accept="image/*,video/*">
        </div>

        <div class="input-group">
            <label>Background Music / Audio</label>
            <input type="text" id="videoMusic" placeholder="YouTube link or file name">
        </div>

        <div class="input-group">
            <label>Video Style / Animation Type</label>
            <input type="text" id="videoStyle" placeholder="e.g., Neon, 3D, Minimal, AI Style">
        </div>

        <div class="input-group">
            <label>Captions / Hashtags</label>
            <input type="text" id="videoCaptions" placeholder="#AI #Business #Reel">
        </div>

        <div class="input-group">
            <label>Call to Action / Text Overlay</label>
            <input type="text" id="videoCTA" placeholder="Subscribe, Visit Website, Contact">
        </div>

        <div class="input-group">
            <label>Contact Info</label>
            <input type="text" id="videoContact" placeholder="Phone / WhatsApp">
        </div>

        <div class="input-group">
            <label>Additional Details</label>
            <textarea id="videoExtra" placeholder="Extra info for video creation"></textarea>
        </div>

        <button type="submit" class="glow-btn">Next → Select Animation ✨</button>
    </form>
</div>

<script>
document.getElementById("videoForm").addEventListener("submit", function(e){
    e.preventDefault();

    const videoData = {
        businessName: document.getElementById("businessName").value,
        videoTitle: document.getElementById("videoTitle").value,
        videoDescription: document.getElementById("videoDescription").value,
        videoDuration: document.getElementById("videoDuration").value,
        videoFiles: [], // store file names
        videoMusic: document.getElementById("videoMusic").value,
        videoStyle: document.getElementById("videoStyle").value,
        videoCaptions: document.getElementById("videoCaptions").value,
        videoCTA: document.getElementById("videoCTA").value,
        videoContact: document.getElementById("videoContact").value,
        videoExtra: document.getElementById("videoExtra").value
    };

    const files = document.getElementById("videoFiles").files;
    for(let i=0; i<files.length; i++){ videoData.videoFiles.push(files[i].name); }

    localStorage.setItem("videoData", JSON.stringify(videoData));

    window.location.href = "video-style.html";
});
</script>

</body>
</html>
